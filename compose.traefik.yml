services:
  ialvaro:
    container_name: ialvaro
    image: ghcr.io/pnpm/pnpm:latest
    restart: unless-stopped
    command: >
      sh -c
      "
      pnpm runtime set node latest -g
      && cd /project
      && pnpm install
      && pnpm run build
      && exec node dist/server/entry.mjs
      "
    volumes:
      - .:/project
    networks: [proxy]
    labels:
      traefik.enable: true
      traefik.http.routers.ialvaro.entrypoints: https
      traefik.http.routers.ialvaro.rule: Host(`ialvaro.com`) || Host(`azama.es`)
      traefik.http.routers.ialvaro.service: ialvaro
      traefik.http.services.ialvaro.loadbalancer.server.port: 4321

networks:
  proxy:
    external: {}
